<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#070b08">
  <meta name="description" content="开赛前：直白、清楚的足球赛前分析与历史验证。">
  <title>开赛前｜足球赛前分析</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://flagcdn.com">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <a class="brand" href="#upcoming" aria-label="开赛前首页">
        <span class="brand-mark" aria-hidden="true"><i class="ri-football-line"></i></span>
        <span>开赛前</span>
        <small>PRE-MATCH</small>
      </a>
      <nav class="desktop-nav" aria-label="主导航">
        <a href="#upcoming" data-nav="upcoming"><i class="ri-calendar-check-line"></i>待赛</a>
        <a href="#history" data-nav="history"><i class="ri-line-chart-line"></i>准确率</a>
        <a href="#search" data-nav="search"><i class="ri-search-line"></i>搜索</a>
      </nav>
      <button class="icon-button" type="button" data-action="notice" aria-label="查看更新说明">
        <i class="ri-notification-3-line"></i><span class="notification-dot"></span>
      </button>
    </header>

    <main id="app" tabindex="-1"></main>

    <nav class="mobile-nav" aria-label="移动端导航">
      <a href="#upcoming" data-nav="upcoming"><i class="ri-calendar-check-line"></i><span>待赛</span></a>
      <a href="#history" data-nav="history"><i class="ri-line-chart-line"></i><span>准确率</span></a>
      <a href="#search" data-nav="search"><i class="ri-search-line"></i><span>搜索</span></a>
    </nav>
  </div>

  <div class="modal-layer" id="modal-layer" hidden>
    <button class="modal-backdrop" type="button" data-action="close-modal" aria-label="关闭弹窗"></button>
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭"><i class="ri-close-line"></i></button>
      <div id="modal-content"></div>
    </section>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <noscript>请启用 JavaScript 以浏览完整分析。</noscript>
  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
